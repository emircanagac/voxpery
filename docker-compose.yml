# Voxpery — Production-ready infrastructure stack (Postgres + Redis + LiveKit SFU)
# Usage: docker compose up -d
# Note: Backend (Rust) and Web (Node + Nginx) are expected to run on the host.
# See docs/hosting.md for detailed deployment instructions.

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxpery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxpery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      POSTGRES_DB: ${POSTGRES_DB:-voxpery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxpery"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis is required by LiveKit for distributed state and room management
  redis:
    image: redis:7-alpine
    container_name: voxpery-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LiveKit SFU: Handles WebRTC signaling and media routing
  livekit:
    image: livekit/livekit-server:latest
    container_name: voxpery-livekit
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set in .env file}
      # LiveKit requires keys in a combined format (key:secret) without spaces
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET}"
    ports:
      - "7880:7880"                   # WebSocket signaling (Safe to proxy via Cloudflare)
      - "7881:7881"                   # TCP fallback
      - "7882:7882/udp"               # Primary UDP port
      - "50000-50200:50000-50200/udp" # WebRTC media ports (~100 concurrent users capacity)
    configs:
      - source: livekit_config
        target: /etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]

volumes:
  postgres_data:
  redis_data:

configs:
  livekit_config:
    content: |
      port: 7880
      log_level: info

      rtc:
        # UDP port range must match the exposed ports in the docker service definition
        port_range_start: 50000
        port_range_end: 50200
        udp_port: 7882
        tcp_port: 7881
        # Enables direct client-to-server UDP for media, bypassing reverse proxies (NAT Traversal)
        use_external_ip: true

      redis:
        address: redis:6379

      # Security Note: API keys are securely loaded from the LIVEKIT_KEYS environment variable.
      # Do not hardcode credentials in this configuration block.
