# Voxpery — Full stack Docker Compose
# Starts: Postgres + Redis + LiveKit + Rust backend + React web app
# Usage: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: voxpery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxpery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-voxpery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxpery} -d ${POSTGRES_DB:-voxpery}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: voxpery-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # LiveKit runs on bridge networking for cross-platform Docker compatibility.
  livekit:
    image: livekit/livekit-server:latest
    container_name: voxpery-livekit
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET must be set in .env}
      LIVEKIT_RTC_USE_EXTERNAL_IP: ${LIVEKIT_RTC_USE_EXTERNAL_IP:-false}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50200:50000-50200/udp"
    configs:
      - source: livekit_config
        target: /etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: voxpery-server
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    container_name: voxpery-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
  redis_data:

configs:
  livekit_config:
    content: |
      port: 7880
      log_level: info

      rtc:
        port_range_start: 50000
        port_range_end: 50200
        udp_port: 7882
        tcp_port: 7881
        use_external_ip: ${LIVEKIT_RTC_USE_EXTERNAL_IP:-false}

      # LiveKit and Redis are on the same Compose network.
      redis:
        address: redis:6379

      keys:
        "${LIVEKIT_API_KEY:-devkey}": "${LIVEKIT_API_SECRET}"
