name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref to deploy (default: main)"
        required: false
        default: "main"
        type: string
      image_tag:
        description: "Pinned Docker image tag to deploy (example: sha-abc1234)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-manual-${{ inputs.deploy_ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 25m
          script: |
            cd ~/voxpery
            REF="${{ inputs.deploy_ref }}"
            git fetch --tags origin
            if git show-ref --verify --quiet "refs/remotes/origin/${REF}"; then
              git checkout --detach "refs/remotes/origin/${REF}"
            else
              git checkout --detach "${REF}"
            fi
            export VOXPERY_SERVER_IMAGE="voxpery/voxpery-server:${{ inputs.image_tag }}"
            export VOXPERY_WEB_IMAGE="voxpery/voxpery-web:${{ inputs.image_tag }}"
            docker compose pull server web
            docker compose up -d --no-build --remove-orphans
            docker image prune -f
            curl -fsS http://127.0.0.1:3001/health >/dev/null
            echo "Deploy complete: ref=${{ inputs.deploy_ref }} image_tag=${{ inputs.image_tag }}"
