name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.24.3 \
            git --redact --verbose --exit-code 1

  backend:
    name: Backend Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server -> target

      - name: Check
        working-directory: apps/server
        run: cargo check

      - name: Test
        working-directory: apps/server
        run: cargo test

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  docker_publish:
    name: Docker Publish
    needs:
      - security
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: voxpery/voxpery-server
            context: ./apps/server
            dockerfile: ./apps/server/Dockerfile
          - component: frontend
            image: voxpery/voxpery-web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "sha_tag=sha-${SHORT_SHA}"
            echo "latest_tag=latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        if: matrix.component == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.tags.outputs.latest_tag }}
            ${{ matrix.image }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Build and push frontend
        if: matrix.component == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.tags.outputs.latest_tag }}
            ${{ matrix.image }}:${{ steps.tags.outputs.sha_tag }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
