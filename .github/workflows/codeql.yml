name: CodeQL

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/desktop/src-tauri/**'
      - 'apps/web/**'
      - '.github/workflows/codeql.yml'
  push:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      js: ${{ steps.filter.outputs.js }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'apps/server/**/*.rs'
              - 'apps/server/Cargo.toml'
              - 'apps/server/Cargo.lock'
              - 'apps/desktop/src-tauri/**/*.rs'
              - 'apps/desktop/src-tauri/Cargo.toml'
              - 'apps/desktop/src-tauri/Cargo.lock'
            js:
              - 'apps/web/**/*.{js,jsx,ts,tsx,mjs,cjs}'
              - 'apps/web/package.json'
              - 'apps/web/package-lock.json'
              - 'apps/web/pnpm-lock.yaml'

  analyze-rust:
    name: Analyze (rust)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL (rust)
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: ${{ github.event_name == 'pull_request' && 'none' || 'autobuild' }}

      - name: Autobuild (rust full scans)
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis (rust)
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:rust'

  analyze-js:
    name: Analyze (javascript-typescript)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL (javascript-typescript)
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis (javascript-typescript)
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
