version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      github-actions-nonbreaking:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/apps/server"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:15"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      rust-nonbreaking:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      web-nonbreaking:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
